name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: input
    id: package
    attributes:
      label: Affected package
      description: "e.g. MVFC.SQLCraft.MsSQL"
      placeholder: "MVFC.SQLCraft.MsSQL"
    validations:
      required: true

  - type: input
    id: package_version
    attributes:
      label: Package version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: dotnet_version
    attributes:
      label: .NET version
      placeholder: "net9.0 / net10.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / Ubuntu 24.04 / macOS 15"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Add helper...
        2. Run AppHost...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or stack trace
      render: text
