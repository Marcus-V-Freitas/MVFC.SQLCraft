name: CI / Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  ENABLE_CODECOV: ${{ secrets.CODECOV_TOKEN != '' && 'true' || 'false' }}

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Cake
        run: dotnet tool install --global Cake.Tool

      - name: Run Cake
        run: dotnet-cake build.cake

      - name: Publish summary
        if: always()
        run: cat CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: CoverageReport/SummaryGithub.md

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport
          retention-days: 30

      - name: Check coverage file exists
        if: always()
        run: ls -la coverage/

      - name: Upload to Codecov
        if: always() && env.ENABLE_CODECOV == 'true'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/coverage.cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration
          fail_ci_if_error: true

  build-and-publish:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build e Pack
        run: |
          mkdir -p ./nupkg
          for csproj in $(find ./src -name "*.csproj"); do
            dotnet pack "$csproj" --configuration Release --output ./nupkg
          done

      - name: Publicar no NuGet
        run: |
          for nupkg in ./nupkg/*.nupkg; do
            dotnet nuget push "$nupkg" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Publish to GitHub Packages
        run: |
          for nupkg in ./nupkg/*.nupkg; do
            dotnet nuget push "$nupkg" \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
              --api-key ${{ secrets.GITHUB_TOKEN }} \
              --skip-duplicate
          done

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-publish

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## What's Changed
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.

            ## Packages
            Published to [NuGet](https://www.nuget.org/profiles/marcuscosta).

  cleanup-tag-on-failure:
    runs-on: ubuntu-latest
    needs: [test-and-coverage, build-and-publish, create-release]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      (needs.test-and-coverage.result == 'failure' ||
       needs.build-and-publish.result == 'failure' ||
       needs.create-release.result == 'failure')
    permissions:
      contents: write
    steps:
      - name: Cleanup Release and Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::warning::Limpando tag/release - pipeline falhou em um dos estágios."
          # Tenta deletar o release e a tag associada via GitHub CLI
          gh release delete ${{ github.ref_name }} --yes --cleanup-tag || true
          # Fallback: garante a deleção da tag mesmo que o release nunca tenha sido criado
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} --delete ${{ github.ref_name }} || true
